name: Checks

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  typos:
    name: spell check with typos
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Run typos command
        shell: nix shell nixpkgs#typos --quiet --command bash {0}
        run: typos --hidden --exclude .git --format brief

  cocogitto:
    name: check conventional commits
    runs-on: ubuntu-latest
    # Only run this step in the main branch.
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Check the latest commit message
        shell: nix shell nixpkgs#cocogitto --quiet --command bash {0}
        run: cog check HEAD..HEAD

  rumdl:
    name: lint markdown by rumdl
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Run rumdl command
        shell: nix shell nixpkgs#rumdl --quiet --command bash {0}
        run: rumdl check .

  validate-skills:
    name: validate skills frontmatter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: home/skills
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Run the script to validate skills
        shell: nix shell nixpkgs#yq-go --quiet --command bash {0}
        run: sh validate-skills.sh .

  nix-flake-check:
    name: nix flake check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Run nix command
        run: nix flake check --impure --all-systems

  nixfmt-check:
    name: nixfmt check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Run nix command
        shell: nix shell nixpkgs#nixfmt-rs --quiet --command bash {0}
        run: nixfmt --check .

  shellcheck:
    name: lint shell scripts by shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: cachix/install-nix-action@v31
      - name: Run shellcheck command
        shell: nix shell nixpkgs#shellcheck --quiet --command bash {0}
        run: shellcheck ./scripts/*.sh
